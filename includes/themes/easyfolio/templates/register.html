<!-- register_content -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="card shadow-lg overflow-hidden">
                <div class="card-body p-0">
                    <div class="row g-0">
                        <!-- Linke Bildhälfte -->
                        <div class="col-sm-5 d-none d-sm-block sign_pic_bg"></div>

                        <!-- Rechte Inhaltshälfte -->
                        <div class="col-sm-7 p-4">
                            <div class="text-start">

                                <!-- Überschrift -->
                                <div class="h3 fw-light">
                                    <span>{reg_title}</span>
                                </div>

                                <!-- Fehlermeldungen -->
                                {if error_message}
                                    <div class="alert alert-danger">{error_message}</div>
                                {endif}

                                <!-- Erfolgsmeldung -->
                                {if success_message}
                                    <div class="alert alert-success">{success_message}</div>
                                {endif}

                                <!-- Zusätzliche Nachricht -->
                                {if message_zusatz}
                                    <p>{message_zusatz}</p>
                                {endif}

                                {if isreg}

                                {else}

                                <!-- Login-Hinweis -->
                                <p class="mb-4 text-end">
                                    {login_text}
                                    {loginlink}
                                </p>

                                <!-- Formular -->
                                <form action="{form_action}" method="POST" novalidate>
                                    <input type="hidden" name="csrf_token" value="{csrf_token}">

                                    <!-- ✅ Autofill-Fänger (verhindert E-Mail im Username) -->
                                    <input
                                        type="email"
                                        name="email_autofill"
                                        autocomplete="email"
                                        tabindex="-1"
                                        aria-hidden="true"
                                        style="position:absolute; left:-9999px; height:0; width:0;"
                                    >

                                    <!-- PATCH: Honeypot (unsichtbar, MUSS leer bleiben) -->
                                    <div style="position:absolute; left:-9999px; height:0; overflow:hidden;">
                                        <label for="company">Company</label>
                                        <input type="text" name="company" id="company" autocomplete="off">
                                    </div>
                                    <!-- PATCH END -->

                                    <!-- Username -->
                                    <div class="mb-3">
                                        <label for="username" class="form-label">{username_label}</label>
                                        <input
                                            type="text"
                                            name="username"
                                            class="form-control"
                                            id="username"
                                            required
                                            pattern="[a-zA-Z0-9_-]{3,20}"
                                            placeholder="{enter_your_name}"
                                            autocomplete="off"
                                        >
                                    </div>

                                    <!-- E-Mail -->
                                    <div class="mb-3">
                                        <label for="email" class="form-label">{email_address_label}</label>
                                        <input
                                            type="email"
                                            name="email"
                                            class="form-control"
                                            id="email"
                                            required
                                            placeholder="{enter_your_email}"
                                            autocomplete="email"
                                        >
                                    </div>

                                    <!-- Passwort -->
                                    <div class="mb-3">
                                        <label for="password" class="form-label">{password_label}</label>
                                        <input
                                            type="password"
                                            name="password"
                                            class="form-control"
                                            id="password"
                                            placeholder="{enter_password}"
                                            required
                                            autocomplete="new-password"
                                        >
                                    </div>

                                    <div class="progress mt-1" style="height:6px;">
                                        <div id="pw-strength-bar" class="progress-bar"></div>
                                    </div>

                                    <!-- Passwort wiederholen -->
                                    <div class="mb-3">
                                        <label for="password_repeat" class="form-label">{password_repeat_label}</label>
                                        <input
                                            type="password"
                                            name="password_repeat"
                                            class="form-control"
                                            id="password_repeat"
                                            placeholder="{enter_password_repeat}"
                                            required
                                            autocomplete="new-password"
                                        >
                                    </div>

                                    <div class="alert alert-info small mt-2" role="alert">
                                        <i class="bi bi-shield-lock me-1"></i>
                                        {password_hint}
                                    </div>

                                    <!-- Nutzungsbedingungen -->
                                    <div class="form-check mb-3">
                                        <input
                                            type="checkbox"
                                            name="terms"
                                            class="form-check-input"
                                            id="terms"
                                            required
                                        >
                                        <label for="terms" class="form-check-label">
                                            {terms_of_use_text}
                                        </label>
                                    </div>

                                    <!-- reCAPTCHA -->
                                    {if recaptcha_site_key}
                                    <div class="form-group">
                                        <label for="input-security-code" class="control-label">
                                            {security_code}:
                                        </label>
                                        <div class="input-group">
                                            {recaptcha_site_key}
                                        </div>
                                    </div>
                                    {endif}

                                    <button type="submit" class="btn btn-primary w-100">
                                        {register}
                                    </button>
                                </form>

                                <hr>
                                {reg_info_text}

                                {endif}

                            </div>
                        </div>
                        <!-- Ende Rechte Inhaltshälfte -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script>
const pwInput = document.querySelector('input[name="password"]');
const bar  = document.getElementById('pw-strength-bar');
const text = document.getElementById('pw-strength-text');

pwInput?.addEventListener('input', () => {
    const v = pwInput.value;
    const len = v.length;

    // Zeichenarten
    const hasLower   = /[a-z]/.test(v);
    const hasUpper   = /[A-Z]/.test(v);
    const hasNumber  = /[0-9]/.test(v);
    const hasSpecial = /[^A-Za-z0-9]/.test(v);

    const typesCount = [hasLower, hasUpper, hasNumber, hasSpecial].filter(Boolean).length;

    // 🔁 Wiederholungen prüfen
    const freq = {};
    for (const c of v) freq[c] = (freq[c] || 0) + 1;
    const maxRepeat = Math.max(...Object.values(freq), 0);
    const repeatRatio = maxRepeat / len;

    let level = 0;

    // ❌ hart blockieren
    if (len < 6 || typesCount === 1) {
        level = 0; // rot
    }
    // ⚠️ schwach
    else if (len < 8 || repeatRatio > 0.7) {
        level = 1; // gelb
    }
    // 🟠 mittel
    else if (len < 10 || typesCount < 3) {
        level = 2;
    }
    // 🟢 stark
    else {
        level = 3;
    }

    const states = [
        { c: 'bg-danger',  w: '25%',  t: 'Sehr schwach' },
        { c: 'bg-warning', w: '50%',  t: 'Schwach' },
        { c: 'bg-info',    w: '75%',  t: 'Mittel' },
        { c: 'bg-success', w: '100%', t: 'Stark' }
    ];

    const s = states[level];
    bar.className = 'progress-bar ' + s.c;
    bar.style.width = s.w;
    text.textContent = 'Passwortstärke: ' + s.t;
});
</script>
<!-- END -->
