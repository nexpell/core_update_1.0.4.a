<!-- reset_password_form -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg p-4">
        <h2 class="text-center mb-4">{reset_password_title}</h2>
{if error}
<div class="alert alert-danger">
    {error}
</div>
{endif}

<form method="post">

    <!-- TOKEN -->
    <input type="hidden" name="token" value="{token}">

    <!-- NEW PASSWORD -->
    <div class="mb-3">
        <label class="form-label">
            {label_new_password}
        </label>
        <input
            type="password"
            name="password"
            class="form-control"
            required
            minlength="8"
            autocomplete="new-password">
        
        <div class="form-text" id="pw-strength-text">
            Passwortstärke: –
        </div>

        <div class="progress mt-1" style="height:6px;">
            <div id="pw-strength-bar" class="progress-bar"></div>
        </div>
    </div>

    <!-- REPEAT PASSWORD -->
    <div class="mb-3">
        <label class="form-label">
            {label_repeat_password}
        </label>
        <input
            type="password"
            name="password_repeat"
            class="form-control"
            required
            minlength="8"
            autocomplete="new-password">
    </div>

    <div class="alert alert-info small mt-2" role="alert">
        <i class="bi bi-shield-lock me-1"></i>
        {password_hint}
    </div>


    <button type="submit" class="btn btn-primary w-100">
        {submit_password}
    </button>

</form>

</div>
    </div>
  </div>
</div>

<script>
const pwInput = document.querySelector('input[name="password"]');
const bar  = document.getElementById('pw-strength-bar');
const text = document.getElementById('pw-strength-text');

pwInput?.addEventListener('input', () => {
    const v = pwInput.value;
    const len = v.length;

    // Zeichenarten
    const hasLower   = /[a-z]/.test(v);
    const hasUpper   = /[A-Z]/.test(v);
    const hasNumber  = /[0-9]/.test(v);
    const hasSpecial = /[^A-Za-z0-9]/.test(v);

    const typesCount = [hasLower, hasUpper, hasNumber, hasSpecial].filter(Boolean).length;

    // 🔁 Wiederholungen prüfen
    const freq = {};
    for (const c of v) freq[c] = (freq[c] || 0) + 1;
    const maxRepeat = Math.max(...Object.values(freq), 0);
    const repeatRatio = maxRepeat / len;

    let level = 0;

    // ❌ hart blockieren
    if (len < 6 || typesCount === 1) {
        level = 0; // rot
    }
    // ⚠️ schwach
    else if (len < 8 || repeatRatio > 0.7) {
        level = 1; // gelb
    }
    // 🟠 mittel
    else if (len < 10 || typesCount < 3) {
        level = 2;
    }
    // 🟢 stark
    else {
        level = 3;
    }

    const states = [
        { c: 'bg-danger',  w: '25%',  t: 'Sehr schwach' },
        { c: 'bg-warning', w: '50%',  t: 'Schwach' },
        { c: 'bg-info',    w: '75%',  t: 'Mittel' },
        { c: 'bg-success', w: '100%', t: 'Stark' }
    ];

    const s = states[level];
    bar.className = 'progress-bar ' + s.c;
    bar.style.width = s.w;
    text.textContent = 'Passwortstärke: ' + s.t;
});
</script>



<!-- END -->
