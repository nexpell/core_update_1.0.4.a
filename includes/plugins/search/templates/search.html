<!-- search_head -->
<div class="nx-search-head mb-4">
  <div class="nx-search-kicker">{title}</div>
  <h1 class="nx-search-headline mb-0">{subtitle}</h1>
</div>
<!-- END -->

<!-- search_form -->
<div class="nx-search-form-card mb-4">
  <form action="index.php" method="get" class="row g-2 align-items-stretch">
      <input type="hidden" name="site" value="search">
      <input type="hidden" name="language" value="{current_lang}">
      <div class="col-12 col-lg-10">
        <input type="text" name="q" value="{query}" class="form-control nx-search-input" placeholder="{placeholder}" required>
      </div>
      <div class="col-12 col-lg-2 d-grid">
        <button type="submit" class="btn btn-primary nx-search-button">
          <i class="bi bi-search me-2"></i>{button}
        </button>
      </div>
  </form>
</div>
<!-- END -->

<!-- search_result_item -->
<article class="nx-search-result-card mb-3">
  <div class="nx-search-result-body">
    <div class="mb-3">
      <span class="badge nx-search-type">{type}</span>
    </div>
    <h2 class="nx-search-result-title mb-3">
      <a href="{url}" class="text-decoration-none nx-search-link">{title}</a>
    </h2>
    <p class="mb-4 nx-search-snippet">{snippet}</p>
    <div>
      <a href="{url}" class="btn btn-sm btn-outline-primary nx-search-open">{open_label}</a>
    </div>
  </div>
</article>
<!-- END -->

<!-- search_no_results -->
<div class="alert alert-warning rounded shadow-sm border-0" role="alert">
  <i class="bi bi-info-circle me-2"></i> {no_results}
</div>
<!-- END -->

<!-- search_foot -->
<div class="pb-2"></div>
<!-- END -->

<!-- search_quick -->
<div class="card rounded nx-search-quick-card">
  <div class="card-body p-3">
    <form action="{quick_action}" method="get" class="row g-2">
      <input type="hidden" name="site" value="search">
      <input type="hidden" name="language" value="{current_lang}">
      <div class="col-12">
        <input type="text" name="q" value="{query}" class="form-control rounded nx-search-input" placeholder="{placeholder}" required>
      </div>
      <div class="col-12 d-grid">
        <button type="submit" class="btn btn-primary rounded nx-search-button">
          <i class="bi bi-search me-2"></i>{button}
        </button>
      </div>
    </form>
  </div>
</div>
<!-- END -->
