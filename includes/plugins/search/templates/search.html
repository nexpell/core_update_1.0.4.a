<!-- search_head -->
<div class="head-boxes {class}">
    <span class="head-boxes-head">{title}</span>
    <h2 class="head-h2">
        <span class="head-boxes-title">{title}</span>
    </h2>
    <p class="head-boxes-foot">{subtitle}</p>
</div>
<!-- END -->

<!-- search_form -->
<div class="card rounded nx-search-form-card mb-4">
  <div class="card-body p-3 p-md-4">
    <form action="index.php" method="get" class="row g-2 g-md-3 align-items-center">
      <input type="hidden" name="site" value="search">
      <input type="hidden" name="language" value="{current_lang}">
      <div class="col-12 col-md-9">
        <input type="text" name="q" value="{query}" class="form-control rounded nx-search-input" placeholder="{placeholder}" required>
      </div>
      <div class="col-12 col-md-3 d-grid">
        <button type="submit" class="btn btn-primary rounded nx-search-button">
          <i class="bi bi-search me-2"></i>{button}
        </button>
      </div>
    </form>
  </div>
</div>
<!-- END -->

<!-- search_result_item -->
<article class="card rounded nx-search-result-card mb-3">
  <div class="card-body p-3 p-md-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
      <span class="badge rounded-pill nx-search-type">{type}</span>
      <a href="{url}" class="btn btn-sm btn-outline-primary">{open_label}</a>
    </div>
    <h2 class="h4 mb-3">
      <a href="{url}" class="text-decoration-none nx-search-link">{title}</a>
    </h2>
    <p class="mb-0 text-muted nx-search-snippet">{snippet}</p>
  </div>
</article>
<!-- END -->

<!-- search_no_results -->
<div class="alert alert-warning rounded shadow-sm border-0" role="alert">
  <i class="bi bi-info-circle me-2"></i> {no_results}
</div>
<!-- END -->

<!-- search_foot -->
<div class="pb-2"></div>
<!-- END -->

<!-- search_quick -->
<div class="card rounded nx-search-quick-card">
  <div class="card-body p-3">
    <form action="{quick_action}" method="get" class="row g-2">
      <input type="hidden" name="site" value="search">
      <input type="hidden" name="language" value="{current_lang}">
      <div class="col-12">
        <input type="text" name="q" value="{query}" class="form-control rounded nx-search-input" placeholder="{placeholder}" required>
      </div>
      <div class="col-12 d-grid">
        <button type="submit" class="btn btn-primary rounded nx-search-button">
          <i class="bi bi-search me-2"></i>{button}
        </button>
      </div>
    </form>
  </div>
</div>
<!-- END -->
