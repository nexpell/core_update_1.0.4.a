<!-- navigation_main -->
<nav id="mainNavbar" class="sticky-top navbar navbar-expand-lg {navbar_class} {navbar_shadow}" {navbar_theme} {dropdown_animation} {nav_data_attrs} {nav_height_style}>

    <div class="container position-relative d-flex">

        <!-- LOGO -->
        <a href="{home_url}"
           class="navbar-brand {logo_center}">
            <img id="mainLogo"
                 src="{logo_light}"
                 data-light="{logo_light}"
                 data-dark="{logo_dark}"
                 class="nav-logo"
                 {logo_height}
                 {dynamic_logo_attr}>
        </a>

        <!-- BURGER -->
        <button class="navbar-toggler ms-auto" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#nxNavBarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- RIGHT SIDE -->
        <div class="collapse navbar-collapse justify-content-lg-end" id="nxNavBarContent">           

            <!-- Rechts -->
            <ul class="navbar-nav d-flex ms-lg-auto">
                {mainnav}
                {messenger_badge}
                {forum_badge}
                {usernav}

                <!-- LANGUAGE -->
                <li class="nav-item dropdown">
                    <a class="nav-link d-flex align-items-center gap-1"
                       href="#" data-bs-toggle="dropdown" data-bs-display="static">
                        <img src="{current_flag}" style="width:22px;height:22px;border-radius:4px;">
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        {language_list}
                    </ul>
                </li>

                <!-- THEME -->
                {theme_toggle}
            </ul>
        </div>

    </div>
</nav>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const navbar = document.getElementById("mainNavbar");
  if (!navbar) return;

  // 1) Animation-Klasse auf Dropdown-Menüs
  const animation = navbar.dataset.animation || "fade";
  navbar.querySelectorAll(".dropdown-menu").forEach(menu => {
    menu.classList.add(animation);
  });

  // 2) Hover-Dropdowns
  const trigger = navbar.dataset.dropdownTrigger || "hover";
  const delay = parseInt(navbar.dataset.hoverDelay || "0", 10) || 0;

  if (trigger === "hover" && window.matchMedia("(hover: hover)").matches) {
    navbar.querySelectorAll(".nav-item.dropdown").forEach(dd => {
      const toggle = dd.querySelector('[data-bs-toggle="dropdown"]');
      if (!toggle) return;

      const instance = bootstrap.Dropdown.getOrCreateInstance(toggle);

      let tShow = null;
      let tHide = null;

      dd.addEventListener("mouseenter", () => {
        if (tHide) { clearTimeout(tHide); tHide = null; }
        tShow = setTimeout(() => instance.show(), delay);
      });

      dd.addEventListener("mouseleave", () => {
        if (tShow) { clearTimeout(tShow); tShow = null; }
        tHide = setTimeout(() => instance.hide(), Math.min(120, delay));
      });
    });
  }

  // 3) Dynamic Logo Height
  const logo = document.querySelector("#mainLogo[data-dynamic-logo='1']");

  function updateLogoHeight() {
    const navHeight = navbar.offsetHeight;

    if (!logo) return;
    const newHeight = Math.max(30, navHeight - 12);
    logo.style.height = newHeight + "px";
  }

  updateLogoHeight();
  window.addEventListener("load", updateLogoHeight);
  window.addEventListener("resize", updateLogoHeight);

  // 4) Navbar Animationsklasse setzen
  const anim = (navbar.dataset.animation || "fade").toLowerCase().trim();

  navbar.classList.remove(
    "nx-anim-fade",
    "nx-anim-slide",
    "nx-anim-slidefade",
    "nx-anim-zoom",
    "nx-anim-fadeup",
    "nx-anim-scalefade",
    "nx-anim-slideblur",
    "nx-anim-tilt"
  );
  navbar.classList.add("nx-anim-" + anim);

  // 5) Theme (data-bs-theme) vom <html> auf #mainNavbar spiegeln,
  function syncNavbarThemeFromRoot() {
    const theme = document.documentElement.getAttribute("data-bs-theme") || "light";
    navbar.setAttribute("data-bs-theme", theme);
  }

  syncNavbarThemeFromRoot();

  new MutationObserver(syncNavbarThemeFromRoot).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ["data-bs-theme"],
  });

});
</script>
<!-- END -->
