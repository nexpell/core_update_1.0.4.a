<!-- sponsors_head -->
<div class="head-boxes {class}">
    <span class="head-boxes-head">{title}</span>
    <h2 class="head-h2">
        <span class="head-boxes-title">{title}</span>
    </h2>
    <p class="head-boxes-foot">{subtitle}</p>
</div>
<!-- END -->
<!-- sponsors_main -->
<section class="py-5">
  <div class="container">
    <div class="row align-items-center">
      
      <!-- Linker Textblock -->
      <div class="col-lg-5 mb-4 mb-lg-0">
        <h3>{headline}</h3>
        <p>{text}</p>
      </div>

      <!-- Rechter Sponsorenbereich -->
      <div class="col-lg-7">
        <div class="row g-4">
          {foreach sponsors as sponsor}
  <div class="col-6 col-md-4 text-center">
    <div class="sponsor-logo-card">
      <a href="/includes/plugins/sponsors/click.php?id={sponsor.id}" target="_blank" rel="nofollow" class="sponsor-logo-link">
        <img src="{sponsor.logo}" alt="{sponsor.name}" class="img-fluid sponsor-logo-image">
      </a>
      <div class="mt-2 fw-bold text-uppercase sponsor-logo-level" style="color: {sponsor.color};">{sponsor.level}</div>
    </div>
  </div>
{/foreach}

        </div>
      </div>

    </div>
  </div>
</section>
<!-- END -->
