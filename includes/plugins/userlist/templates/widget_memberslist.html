<!-- widget_memberslist_head -->

<style>
.team-member {
    text-align: center;
    position: relative;
    overflow: hidden;
    /*background: #fff;*/
    border: var(--bs-card-border-width) solid var(--bs-card-border-color);
    border-radius: 8px;
    box-shadow: 0px 0 30px rgba(1, 41, 112, 0.08);
    transition: 0.3s;
}
.team-member:hover { transform: translateY(-8px); }

.team-member .member-img {
    position: relative;
    overflow: hidden;
    height: 260px;
    border-radius: 8px 8px 0 0;
}
.team-member .member-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
}
.team-member .social {
    position: absolute;
    left: 0;
    bottom: -40px;
    right: 0;
    height: 40px;
    opacity: 0;
    background: rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: all .3s ease;
}
.team-member:hover .social {
    bottom: 0;
    opacity: 1;
}
.team-member .member-info {
    padding: 20px 15px;
}
</style>

<div class="container">
<div class="card mb-4 mt-4 {card_class}">
    <div class="card-body pb-0">
        <h4 class="fw-bold mb-1 text-center">Memberlist</h4>
        <p class="text-muted small mb-3 text-center">Alle Mitglieder</p>
    </div>

    <div class="row g-4 px-4 pb-4">


<!-- END -->
<!-- widget_memberslist_content -->

<div class="col-lg-3 col-md-6 d-flex align-items-stretch">
    <div class="team-member">

        <div class="member-img">
            <img src="{avatar}" alt="">

            <div class="social">
                {social_links}
            </div>
        </div>

        <div class="member-info">

            <h4>
                <a href="{profile}">
                    {username}
                </a>
            </h4>

            <div class="mb-2">
                <span class="badge bg-primary">{roles_badges}</span>
            </div>


            <span class="badge {online_badge_class} text-white px-3 py-2 rounded-pill">
                {online_text}
            </span>

        </div>

    </div>
</div>


<!-- END -->
<!-- widget_memberslist_foot -->
</div>
</div>
<!-- END -->
