<!-- footer_agency_content -->
<footer class="border-top footer-template-agency footer-easy">
  <div class="container py-5">

    <div class="row gy-5 align-items-start">

      <!-- Logo / Footer-Text -->
      <div class="col-12 col-lg-4">
        <div class="d-flex align-items-center gap-3 mb-3 footer-brand-logo">
          {footer_logo_img}
          <div class="lh-sm">
            <div class="fw-semibold fs-4">{myclanname}</div>
          </div>
        </div>

        <p class="text-white-50 mb-4" style="max-width: 46ch;">
          {footer_text}
        </p>
      </div>

      <!-- Link -->
      <div class="col-12 col-lg-8">
        <div class="row g-4 footer-agency-links">
          {footer_blocks}
        </div>
      </div>

    </div>

    <hr class="my-4">

    <!-- Bottom bar -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">

      <div class="d-flex flex-column gap-2 w-100">

        <div class="footer-agency-bottom">
          <div class="footer-agency-bottom-legal">
            {legal_block}
          </div>

          <div class="footer-agency-bottom-social">
            {social_block}
          </div>
        </div>
      </div>

      <div class="d-flex align-items-center gap-2 flex-shrink-0">
        <button class="btn btn-outline-light btn-sm"
                id="back-to-top"
                data-bs-toggle="tooltip"
                title="Nach oben scrollen">
          <i class="bi bi-chevron-up"></i>
        </button>

        <button class="btn btn-secondary btn-sm"
                id="cookie-settings-icon"
                data-bs-toggle="tooltip"
                title="Cookie-Einstellungen">
          <i class="bi bi-gear"></i>
        </button>
      </div>
    </div>

  </div>
</footer>

<style>
  /* ===============================
     FOOTER THEME ENGINE (light/dark)
     Nutzt data-bs-theme am <html> (:root), analog zur Navigation
  =============================== */
  :root{
    --fx-footer-fg: rgba(255,255,255,.92);
    --fx-footer-muted: rgba(255,255,255,.66);
    --fx-footer-border: rgba(255,255,255,.08);

    --fx-footer-btn-outline-border: rgba(255,255,255,.35);
    --fx-footer-btn-outline-fg: rgba(255,255,255,.85);

    --fx-footer-btn-solid-bg: rgba(255,255,255,.12);
    --fx-footer-btn-solid-border: rgba(255,255,255,.18);
    --fx-footer-btn-solid-fg: rgba(255,255,255,.90);
  }

  :root[data-bs-theme="light"]{
    --fx-footer-fg: rgba(0,0,0,.88);
    --fx-footer-muted: rgba(0,0,0,.60);
    --fx-footer-border: rgba(0,0,0,.10);

    --fx-footer-btn-outline-border: rgba(0,0,0,.25);
    --fx-footer-btn-outline-fg: rgba(0,0,0,.78);

    --fx-footer-btn-solid-bg: rgba(0,0,0,.06);
    --fx-footer-btn-solid-border: rgba(0,0,0,.14);
    --fx-footer-btn-solid-fg: rgba(0,0,0,.82);
  }

  :root[data-bs-theme="dark"]{
    --fx-footer-fg: rgba(255,255,255,.92);
    --fx-footer-muted: rgba(255,255,255,.66);
    --fx-footer-border: rgba(255,255,255,.08);

    --fx-footer-btn-outline-border: rgba(255,255,255,.35);
    --fx-footer-btn-outline-fg: rgba(255,255,255,.88);

    --fx-footer-btn-solid-bg: rgba(255,255,255,.12);
    --fx-footer-btn-solid-border: rgba(255,255,255,.18);
    --fx-footer-btn-solid-fg: rgba(255,255,255,.92);
  }

  footer.footer-easy{
    color: var(--fx-footer-fg) !important;
    border-top-color: var(--fx-footer-border) !important;
  }

  footer.footer-easy .text-white-50,
  footer.footer-easy .small.text-white-50{
    color: var(--fx-footer-muted) !important;
  }

  footer.footer-easy hr{
    border-top-color: var(--fx-footer-border) !important;
    opacity: 1 !important;
  }

  /* Links: konsistent im Theme */
  footer.footer-easy a{
    color: inherit;
  }

  /* Theme-fÃ¤hige Action-Buttons */
  footer.footer-easy #back-to-top{
    background: transparent !important;
    border-color: var(--fx-footer-btn-outline-border) !important;
    color: var(--fx-footer-btn-outline-fg) !important;
  }
  footer.footer-easy #back-to-top:hover{
    background: var(--nx-state-hover, rgba(255,255,255,.06)) !important;
  }

  footer.footer-easy #cookie-settings-icon{
    background: var(--fx-footer-btn-solid-bg) !important;
    border-color: var(--fx-footer-btn-solid-border) !important;
    color: var(--fx-footer-btn-solid-fg) !important;
  }
  footer.footer-easy #cookie-settings-icon:hover{
    filter: brightness(1.05);
  }

  /* Footer-Logo: Light/Dark Swap via CSS */
  footer.footer-easy .footer-logo-dark{ display:none; }
  :root[data-bs-theme="dark"] footer.footer-easy .footer-logo-light{ display:none; }
  :root[data-bs-theme="dark"] footer.footer-easy .footer-logo-dark{ display:inline-block; }

footer.footer-template-agency {
    padding: 2rem;
  }

  footer.footer-template-agency .text-uppercase {
    letter-spacing: .14em;
    font-weight: 700 !important;
    margin-bottom: .9rem !important;
  }

  footer.footer-template-agency .footer-brand-logo img {
    height: 40px;
    width: auto;
    opacity: .95;
  }

  footer.footer-template-agency ul.footer-list,
  footer.footer-template-agency ul.footer-links {
    list-style: none !important;
    padding-left: 0 !important;
    margin-left: 0 !important;
  }

  footer.footer-template-agency ul.footer-list > li::marker,
  footer.footer-template-agency ul.footer-links > li::marker {
    content: "" !important;
  }

  footer.footer-template-agency .footer-list {
    padding: 0;
    margin: 0;
    display: grid;
    gap: .6rem;
    justify-items: start;
    text-align: left;
  }

  footer.footer-template-agency .footer-item,
  footer.footer-template-agency .footer-link-item {
    margin-top: 0.7rem;
    line-height: 1.55;
  }

  footer.footer-template-agency .footer-link,
  footer.footer-template-agency .footer-list a {
    color: inherit;
    text-decoration: none;
    opacity: .82;
    transition: opacity .15s ease;
  }

  footer.footer-template-agency .footer-link:hover,
  footer.footer-template-agency .footer-list a:hover {
    opacity: 1;
  }

  footer.footer-template-agency .footer-social-block {
    text-align: left !important;
  }

  footer.footer-template-agency .footer-social-icons {
    display: flex;
    flex-wrap: wrap;
    gap: .75rem;
    align-items: center;
    justify-content: flex-start !important;
    margin-bottom: 0 !important;
  }

  footer.footer-template-agency .footer-social-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;

    width: 24px;
    height: 24px;

    border: 0 !important;
    border-radius: 0 !important;
    background: transparent;

    color: inherit;
    opacity: .85;

    transition: opacity .2s ease, transform .2s ease;
  }

  footer.footer-template-agency .footer-social-chip i {
    font-size: .9rem;
    line-height: 1;
  }

  footer.footer-template-agency .footer-social-chip:hover {
    opacity: 1;
    transform: translateY(-1px);
  }

  footer.footer-template-agency .footer-agency-links {
    display: grid;
    grid-template-columns: repeat(4, max-content);
    column-gap: 2rem;
    row-gap: 1.5rem;
    justify-content: start;
    align-items: start;
  }

  footer.footer-template-agency .footer-agency-links .footer-nav-col {
    flex: initial !important;
    max-width: none !important;
    width: auto !important;
  }

  @media (max-width: 991.98px) {
    footer.footer-template-agency .footer-agency-links {
      grid-template-columns: repeat(2, max-content);
      column-gap: 2rem;
      row-gap: 1.25rem;
    }
  }

  @media (max-width: 767.98px) {
    footer.footer-template-agency .footer-agency-links {
      grid-template-columns: 1fr;
      column-gap: 0;
      row-gap: 1.25rem;
    }
  }

  footer.footer-template-agency .footer-agency-social {
    display: none !important;
  }

  footer.footer-template-agency .footer-agency-legal {
    display: none;
  }

  footer.footer-template-agency hr.my-4 {
    margin-top: 1.5rem !important;
    margin-bottom: 1rem !important;
  }

  footer.footer-template-agency .footer-agency-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    width: 100%;
  }

  footer.footer-template-agency .small.text-white-50 {
    display: none !important;
  }

  footer.footer-template-agency .footer-agency-bottom-legal {
    margin-top: .1rem;
  }

  footer.footer-template-agency .footer-agency-bottom-legal .text-uppercase,
  footer.footer-template-agency .footer-agency-bottom-legal .footer-block-title,
  footer.footer-template-agency .footer-agency-bottom-legal .footer-title {
    display: none !important;
  }

  footer.footer-template-agency .footer-agency-bottom-legal ul.footer-list,
  footer.footer-template-agency .footer-agency-bottom-legal ul.footer-links {
    list-style: none;
    padding: 0;
    margin: 0;

    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: .5rem 1.75rem;
    text-align: left;
  }

  footer.footer-template-agency .footer-agency-bottom-legal .footer-item,
  footer.footer-template-agency .footer-agency-bottom-legal .footer-link-item {
    margin: 0;
  }

  footer.footer-template-agency .footer-agency-bottom-social .footer-social-block {
    margin: 0 !important;
    text-align: right !important;
  }

  footer.footer-template-agency .footer-agency-bottom-social .text-uppercase {
    display: none !important;
  }

  footer.footer-template-agency .footer-agency-bottom-social .footer-social-icons {
    justify-content: flex-end !important;
    margin: 0 !important;
  }

  footer.footer-template-agency .footer-agency-bottom-social {
    padding-right: .75rem;
  }

  @media (max-width: 767.98px) {
    footer.footer-template-agency .footer-agency-bottom {
      flex-direction: column;
      align-items: flex-start;
    }

    footer.footer-template-agency .footer-agency-bottom-social {
      padding-right: 0;
    }

    footer.footer-template-agency .footer-agency-bottom-social .footer-social-icons {
      justify-content: flex-start !important;
    }

    footer.footer-template-agency .footer-agency-bottom-social .footer-social-block {
      text-align: left !important;
    }
  }
</style>
</footer>
<!-- END -->
