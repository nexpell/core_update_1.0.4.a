<!-- footer_simple_content -->
<footer class="border-top footer-template-simple-min footer-easy">
  <div class="container py-5">

    <!-- brand -->
    <div class="text-center mx-auto footer-brand-logo" style="max-width: 720px;">
      <div class="mb-3">
        {footer_logo_img}
      </div>

      <!-- links / rechtliches -->
      <div class="footer-simple-nav my-4">
        {footer_blocks}
        {legal_block}
      </div>

      <!-- Social icons row -->
      <div class="d-flex justify-content-center gap-2 mb-4 mt-4">
        {social_block}
      </div>

      <!-- copyright -->
      <div class="text-white-50 text-center mb-4">
        &copy; {date} {myclanname}
      </div>

    <!-- actions -->
    <div class="d-flex justify-content-center align-items-center gap-3">
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-light btn-sm"
                id="back-to-top"
                data-bs-toggle="tooltip"
                title="Nach oben scrollen">
          <i class="bi bi-chevron-up"></i>
        </button>

        <button class="btn btn-secondary btn-sm"
                id="cookie-settings-icon"
                data-bs-toggle="tooltip"
                title="Cookie-Einstellungen">
          <i class="bi bi-gear"></i>
        </button>
      </div>
    </div>

  </div>

<style>
  /* ===============================
     FOOTER THEME ENGINE (light/dark)
     Nutzt data-bs-theme am <html> (:root), analog zur Navigation
  =============================== */
  :root{
    --fx-footer-fg: rgba(255,255,255,.92);
    --fx-footer-muted: rgba(255,255,255,.66);
    --fx-footer-border: rgba(255,255,255,.08);

    --fx-footer-btn-outline-border: rgba(255,255,255,.35);
    --fx-footer-btn-outline-fg: rgba(255,255,255,.85);

    --fx-footer-btn-solid-bg: rgba(255,255,255,.12);
    --fx-footer-btn-solid-border: rgba(255,255,255,.18);
    --fx-footer-btn-solid-fg: rgba(255,255,255,.90);
  }

  :root[data-bs-theme="light"]{
    --fx-footer-fg: rgba(0,0,0,.88);
    --fx-footer-muted: rgba(0,0,0,.60);
    --fx-footer-border: rgba(0,0,0,.10);

    --fx-footer-btn-outline-border: rgba(0,0,0,.25);
    --fx-footer-btn-outline-fg: rgba(0,0,0,.78);

    --fx-footer-btn-solid-bg: rgba(0,0,0,.06);
    --fx-footer-btn-solid-border: rgba(0,0,0,.14);
    --fx-footer-btn-solid-fg: rgba(0,0,0,.82);
  }

  :root[data-bs-theme="dark"]{
    --fx-footer-fg: rgba(255,255,255,.92);
    --fx-footer-muted: rgba(255,255,255,.66);
    --fx-footer-border: rgba(255,255,255,.08);

    --fx-footer-btn-outline-border: rgba(255,255,255,.35);
    --fx-footer-btn-outline-fg: rgba(255,255,255,.88);

    --fx-footer-btn-solid-bg: rgba(255,255,255,.12);
    --fx-footer-btn-solid-border: rgba(255,255,255,.18);
    --fx-footer-btn-solid-fg: rgba(255,255,255,.92);
  }

  footer.footer-easy{
    color: var(--fx-footer-fg) !important;
    border-top-color: var(--fx-footer-border) !important;
  }

  footer.footer-easy .text-white-50,
  footer.footer-easy .small.text-white-50{
    color: var(--fx-footer-muted) !important;
  }

  footer.footer-easy hr{
    border-top-color: var(--fx-footer-border) !important;
    opacity: 1 !important;
  }

  /* Links: konsistent im Theme */
  footer.footer-easy a{
    color: inherit;
  }

  /* Theme-fÃ¤hige Action-Buttons */
  footer.footer-easy #back-to-top{
    background: transparent !important;
    border-color: var(--fx-footer-btn-outline-border) !important;
    color: var(--fx-footer-btn-outline-fg) !important;
  }
  footer.footer-easy #back-to-top:hover{
    background: var(--nx-state-hover, rgba(255,255,255,.06)) !important;
  }

  footer.footer-easy #cookie-settings-icon{
    background: var(--fx-footer-btn-solid-bg) !important;
    border-color: var(--fx-footer-btn-solid-border) !important;
    color: var(--fx-footer-btn-solid-fg) !important;
  }
  footer.footer-easy #cookie-settings-icon:hover{
    filter: brightness(1.05);
  }

  /* Footer-Logo: Light/Dark Swap via CSS */
  footer.footer-easy .footer-logo-dark{ display:none; }
  :root[data-bs-theme="dark"] footer.footer-easy .footer-logo-light{ display:none; }
  :root[data-bs-theme="dark"] footer.footer-easy .footer-logo-dark{ display:inline-block; }

footer.footer-template-simple-min .footer-brand-logo img {
    height: 56px;
    width: auto;
    opacity: .95;
  }
  @media (min-width: 768px) {
    footer.footer-template-simple-min .footer-brand-logo img {
      height: 72px;
    }
  }

  footer.footer-template-simple-min ul.footer-list,
  footer.footer-template-simple-min ul.footer-links {
    list-style: none !important;
    padding-left: 0 !important;
    margin-left: 0 !important;
  }

  footer.footer-template-simple-min ul.footer-list > li::marker,
  footer.footer-template-simple-min ul.footer-links > li::marker {
    content: "" !important;
  }

  footer.footer-template-simple-min .footer-simple-nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: .75rem 1.5rem;
    margin-left: auto;
    margin-right: auto;
    text-align: center;
  }

  footer.footer-template-simple-min .footer-simple-nav .footer-nav-col,
  footer.footer-template-simple-min .footer-simple-nav .footer-links,
  footer.footer-template-simple-min .footer-simple-nav .footer-legal-block,
  footer.footer-template-simple-min .footer-simple-nav .footer-nav-block {
    flex: 0 0 auto;
    max-width: none;
    text-align: center;
  }

  footer.footer-template-simple-min .footer-simple-nav .text-uppercase,
  footer.footer-template-simple-min .footer-simple-nav .footer-block-title,
  footer.footer-template-simple-min .footer-simple-nav .footer-title,
  footer.footer-template-simple-min .footer-social-block h6 {
    display: none !important;
  }

  footer.footer-template-simple-min .footer-simple-nav ul.footer-list,
  footer.footer-template-simple-min .footer-simple-nav ul.footer-links,
  footer.footer-template-simple-min .footer-legal-block ul.footer-links {
    padding: 0;
    margin: 0;

    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: .5rem 1.25rem;

    text-align: center;
  }

  footer.footer-template-simple-min .footer-simple-nav .footer-item,
  footer.footer-template-simple-min .footer-simple-nav .footer-link-item {
    margin: 0;
    line-height: 1.25;
  }

  footer.footer-template-simple-min .footer-simple-nav a.footer-link,
  footer.footer-template-simple-min .footer-simple-nav .footer-list a,
  footer.footer-template-simple-min .footer-legal-block a.footer-link {
    color: inherit;
    text-decoration: none;

    opacity: .88;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-size: .85rem;

    transition: opacity .15s ease;
  }

  footer.footer-template-simple-min .footer-simple-nav a.footer-link:hover,
  footer.footer-template-simple-min .footer-simple-nav .footer-list a:hover,
  footer.footer-template-simple-min .footer-legal-block a.footer-link:hover {
    opacity: 1;
  }

  footer.footer-template-simple-min .footer-social-block {
    text-align: center !important;
    margin: 0;
  }

  footer.footer-template-simple-min .footer-social-icons {
    display: flex;
    justify-content: center !important;
    align-items: center;
    flex-wrap: wrap;
    gap: .65rem;
    margin-bottom: 0 !important;
  }

  footer.footer-template-simple-min .footer-social-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;

    width: 38px;
    height: 38px;

    color: inherit;
    background: transparent;

    opacity: .9;

    transition:
      opacity .2s ease,
      border-color .2s ease,
      transform .2s ease;
  }

  footer.footer-template-simple-min .footer-social-chip i {
    font-size: 1.1rem;
    line-height: 1;
  }

  footer.footer-template-simple-min .footer-social-chip:hover {
    opacity: 1;
    border-color: rgba(var(--bs-body-color-rgb, 255,255,255), .6);
    transform: translateY(-1px);
  }

  footer.footer-template-simple-min .footer-legal-block {
    text-align: center !important;
  }

  @supports (display: contents) {
    footer.footer-template-simple-min .footer-simple-nav .footer-nav-col,
    footer.footer-template-simple-min .footer-simple-nav .footer-nav-block {
      display: contents;
    }
  }
</style>
</footer>
<!-- END -->
