<!-- parallax_header_content -->
<header id="parallax_header">
  <div class="parallax-image">

    {parallax_pic} <!-- Entweder <video> oder <img> als Hintergrund -->

    <div class="parallax-container">
      <div class="parallax-glass-card">
        <h1 data-aos="zoom-in">{title}</h1>
        <h2 data-aos="zoom-in">{subtitle}</h2>
        <h3 data-aos="fade-up">{description}</h3>
        {link}
      </div>
    </div>

  </div>
  <div class="parallax-after">
        <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M1200 120L0 16.48 0 0 1200 0 1200 120z" class="shape-fill"></path>
        </svg>
    </div>
</header>
<!-- END -->
