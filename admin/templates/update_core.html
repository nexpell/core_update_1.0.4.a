<!-- update_core_wizard -->
<div id="nx-updater">

<!-- Header Card -->
<div class="card shadow-sm mb-3 mt-4">
  <div class="card-header p-3 d-flex align-items-center gap-3">

    <div class="card-title">
      <i class="bi bi-gear-fill"></i>
      <span>{update_title}</span>
      <small class="text-muted">
        {update_subtitle}
      </small>
    </div>

    <!-- Badge / Alert rechts -->
    <div class="ms-auto d-flex align-items-center">
      {beta_badge}
    </div>

  </div>
</div>

<!-- 2-Spalten Layout -->
<div class="row g-3 align-items-start">

  <!-- LEFT -->
  <div class="col-12 col-xl-12">

    <!-- Progress Card -->
    <div class="card shadow-sm">
      <div class="card-header">
        <div class="card-title">
          <i class="bi bi-arrow-repeat"></i> {update_progress_title}
        </div>
      </div>
      <div id="nx-progress-wrapper" class="nx-progress">
        <div class="nx-progress-inner">
          {progress_bar}
        </div>
      </div>
    </div>

    <!-- Wizard Nav Card -->
    <div class="card shadow-sm mt-4">
      <div class="card-header">
        <div class="card-title">
          <i class="bi bi-123"></i> {update_steps_title}
        </div>
      </div>
      <div class="card-body">
        <div class="mb-0">
          {wizard_nav}
        </div>
      </div>
    </div>

    <!-- Mini Footer Hint -->
    <div class="text-muted text-center small mt-3 gap-2">
      <i class="bi bi-shield-check"></i>
      <span>{update_footer_hint}</span>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="col-12 col-xl-12">

    <!-- Log Card -->
    <div class="card shadow-sm">
      <div class="card-header">
        <div class="card-title">
          <i class="bi bi-journal-code"></i> {update_log_title}
        </div>
      </div>
      <div class="card-body">
        <div class="nx-log-surface">
          <div class="nx-log-container p-3">
            {content}
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
</div>


<style>
/* Progress */
.nx-progress {
  position: relative;
  z-index: 2;
}
@media (min-width: 1200px) {
  .nx-progress {
    position: sticky;
    top: 1rem;
  }
}

.nx-progress-inner {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  border-radius: 0.75rem;
  padding: 0.75rem 1rem;
  border: 1px solid #e5e7eb;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.nx-progress-label {
  font-size: 0.85rem;
  font-weight: 600;
  color: #6c757d;
  margin-bottom: 0.35rem;
}

.nx-progress .progress {
  height: 6px;
  border-radius: 999px;
  overflow: hidden;
}

.nx-progress .progress-bar {
  background: linear-gradient(90deg, #fe821d, #ff9c3f);
  transition: width 0.4s ease;
}

.nx-wizard-nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
  gap: 10px;
  margin: 0;
}

.nx-wizard-nav.nav-link {
  border-radius: 0.6rem;
  padding: 0.55rem 1rem;
  border: 1px solid #fe821d;
  color: #212529;
  background-color: #fff;
  font-weight: 500;
  transition: all 0.2s ease-in-out;
}

.nx-wizard-nav.nav-link:hover {
  background-color: #fe821d;
  color: #ffffff;
  border-color: #fe821d;
}

.nx-wizard-nav.nav-link.active {
  background-color: #fe821d;
  border-color: #fe821d;
  color: #fff !important;
  box-shadow: 0 0 6px rgba(254, 130, 29, 0.35);
}

.nx-wizard-nav .nav-link.disabled {
  pointer-events: none;
  opacity: .45;
}

.nx-log-surface {
  min-height: 320px;
}

.nx-beta-badge {
  font-size: .75rem;
}
</style>
<!-- end -->
